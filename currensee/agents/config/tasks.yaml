research_task:
  description: >
    Conduct a thorough research about {client}
    Make sure you find any interesting and relevant information given
    the current year.
  expected_output: >
    A list with 10 bullet points of the most relevant information about {client}
  agent: market_researcher

reporting_task:
  description: >
    Review the context you got and expand each topic into a full section for a report.
    Make sure the report is detailed and contains any and all relevant information.
  expected_output: >
    A fully fledged report with the main topics, each with a full section of information.
    Formatted as markdown without '```'
  agent: market_reporting_analyst






summarization_task:
  description: >
    Review the context you got and summarize the correspondence into a comprehensive history
    of the text. Make sure the report is detailed and contains any and all relevant information.
  expected_output: >
    A full report with the main topics, each with a full section of information. The summary should
    end with a bulleted list of key takeaways from the messages and recommendations for topics
    to focus on in the next discussion with the client.
    Formatted as markdown without '```'
  agent: scribe